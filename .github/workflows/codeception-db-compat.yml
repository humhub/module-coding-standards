name: module-tests-db-compat

on:
  workflow_call:
    inputs:
      humhub-branches:
        description: HumHub core branches to test against, JSON list.
        default: >-
          ['master', 'develop']
        type: string
      php:
        description: PHP versions to test, separated by comma (pinned for the DB sweep).
        default: >-
          ['8.4']
        type: string
      os:
        description: Os to test, separated by comma.
        default: >-
          ['ubuntu-latest']
        type: string
      module-id:
        description: Module ID.
        required: true
        type: string
      extensions:
        description: List of extensions to PHP.
        default: curl, intl, pdo, pdo_mysql, zip, exif, fileinfo, mbstring, gd, ldap
        type: string
      databases:
        # DB-compatibility sweep: each engine across its min + LTS tiers.
        # mariadb 10.11 (min), 11.8 (LTS), 12.3 (LTS); mysql 8.0 (min), 8.4 (LTS), 9.7 (LTS).
        description: Databases to test, JSON list of {engine, version} objects.
        default: >-
          [{"engine": "mariadb", "version": "10.11"}, {"engine": "mariadb", "version": "11.8"}, {"engine": "mariadb", "version": "12.3"}, {"engine": "mysql", "version": "8.0"}, {"engine": "mysql", "version": "8.4"}, {"engine": "mysql", "version": "9.7"}]
        type: string
      use-rest-module:
        description: Activate REST API module for api tests.
        default: false
        type: boolean
      rest-module-branch:
        description: REST API Module Branch.
        type: string
        default: master
      run-solr:
        description: Run Apache Solr.
        default: false
        type: boolean
      run-clamav:
        description: Run virus scanner ClamAV.
        default: false
        type: boolean
      additional-module-id:
        description: Additional Module ID.
        type: string
      additional-module-repo:
        description: Additional Module Repository.
        type: string
        default: humhub
      additional-module-branch:
        description: Additional Module Branch.
        type: string
        default: master

jobs:
  call-base:
    strategy:
      fail-fast: false
      matrix:
        humhub-branch: ${{ fromJson(inputs.humhub-branches) }}
    uses: ./.github/workflows/codeception-base.yml
    with:
      module-id: ${{ inputs.module-id }}
      humhub-branch: ${{ matrix.humhub-branch }}
      php: ${{ inputs.php }}
      extensions: ${{ inputs.extensions }}
      databases: ${{ inputs.databases }}
      use-rest-module: ${{ inputs.use-rest-module }}
      rest-module-branch: ${{ inputs.rest-module-branch }}
      run-solr: ${{ inputs.run-solr }}
      run-clamav: ${{ inputs.run-clamav }}
      additional-module-id: ${{ inputs.additional-module-id }}
      additional-module-repo: ${{ inputs.additional-module-repo }}
      additional-module-branch: ${{ inputs.additional-module-branch }}
